name: Price Parser Sanity Check

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/price-sanity.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/price-sanity.yml'
  workflow_dispatch:

jobs:
  parser-sanity:
    name: Parser Fixture Test (No IP Dependency)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies (scripts/)
        working-directory: ./scripts
        run: npm install

      - name: Run parser fixture sanity check
        working-directory: ./scripts
        run: npm run sanity:prices:fixture

      - name: Parser check passed
        if: success()
        run: |
          echo "✅ Parser fixture tests passed"
          echo "Parser correctness verified. Code is safe to merge."
          echo ""
          echo "Note: Live chain verification runs on Israeli VM on schedule"
          echo "See scripts/SANITY_CHECK.md for details"

      - name: Parser check failed
        if: failure()
        run: |
          echo "❌ Parser sanity check failed!"
          echo "This indicates a regression in the price parsing code."
          echo "Parser must correctly handle:"
          echo "  - XML tag mapping across chain formats"
          echo "  - gzip decompression"
          echo "  - HTML entity decoding"
          echo "  - Field validation (barcode, name, price)"
          exit 1
