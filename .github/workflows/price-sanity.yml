name: Price Sanity Check

on:
  pull_request:
    paths:
      - 'workers/prices/**'
      - 'scripts/**'
      - '.github/workflows/price-sanity.yml'
  push:
    branches: [main]
    paths:
      - 'workers/prices/**'
      - 'scripts/**'
      - '.github/workflows/price-sanity.yml'
  workflow_dispatch:

jobs:
  sanity-check:
    name: Verify Price Sources
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies (scripts/)
        working-directory: ./scripts
        run: npm install

      - name: Run price sanity check
        working-directory: ./scripts
        run: npm run sanity:prices
        env:
          # Allow partial pass if explicitly set in secrets (optional)
          ALLOW_PARTIAL_SANITY: ${{ secrets.ALLOW_PARTIAL_SANITY || 'false' }}

      - name: Report results
        if: always()
        run: |
          echo "✅ Sanity check completed"
          echo "All enabled chains verified for price source access and parseable data."

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Sanity check failed!"
          echo "One or more price sources are unreachable or unparseable."
          echo "This may indicate:"
          echo "  - Chain's pricing feed is down or changed format"
          echo "  - Parser needs updating for new XML schema"
          echo "  - Network/IP-based blocking (if not running from Israeli IP)"
          exit 1
